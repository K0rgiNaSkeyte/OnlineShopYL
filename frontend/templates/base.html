<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}КОРЗИНОЧКА - Интернет-магазин{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Иконки Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Кастомные стили -->
    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #858796;
        }
        .navbar-brand {
            font-weight: 700;
            color: var(--primary-color) !important;
        }
        .auth-buttons {
            margin-left: auto;
            gap: 10px;
        }
        .product-card {
            transition: transform 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15) !important;
        }
        footer {
            background-color: #f8f9fa;
            padding: 2rem 0;
            margin-top: 3rem;
        }
        .pagination {
            justify-content: center;
        }
    </style>
</head>
<body>
    <!-- Навигационная панель -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-basket"></i> КОРЗИНОЧКА
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="/"><i class="bi bi-house"></i> Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="bi bi-cart"></i> Корзина</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-list-ul"></i> Категории
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Электроника</a></li>
                            <li><a class="dropdown-item" href="#">Одежда</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#">Все товары</a></li>
                        </ul>
                    </li>
                </ul>

                <form class="d-flex me-3">
                    <div class="input-group">
                        <input class="form-control" type="search" placeholder="Поиск...">
                        <button class="btn btn-outline-primary" type="submit">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>

                <div class="d-flex auth-buttons">
                    <button id="authButton" class="btn btn-outline-primary">
                        <i class="bi bi-person-plus"></i> Регистрация
                    </button>
                    <button id="loginButton" class="btn btn-primary">
                        <i class="bi bi-box-arrow-in-right"></i> Вход
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <main class="container mb-5">
    </main>

    <!-- Футер -->
    <footer class="bg-light">
        <div class="container py-4">
            <div class="row">
                <div class="col-md-4 mb-4 mb-md-0">
                    <h5><i class="bi bi-shop"></i> КОРЗИНОЧКА</h5>
                    <p class="text-muted">Лучшие товары по доступным ценам с 2023 года</p>
                </div>

                <div class="col-md-4 mb-4 mb-md-0">
                    <h5>Контакты</h5>
                    <ul class="list-unstyled">
                        <li><i class="bi bi-envelope"></i> info@korzinochka.ru</li>
                        <li><i class="bi bi-telephone"></i> +7 (123) 456-78-90</li>
                    </ul>
                </div>

                <div class="col-md-4">
                    <h5>Мы в соцсетях</h5>
                    <div class="social-links">
                        <a href="#" class="me-2 text-decoration-none"><i class="bi bi-telegram fs-4"></i></a>
                        <a href="#" class="me-2 text-decoration-none"><i class="bi bi-vk fs-4"></i></a>
                        <a href="#" class="me-2 text-decoration-none"><i class="bi bi-instagram fs-4"></i></a>
                    </div>
                </div>
            </div>

            <hr class="my-4">

            <div class="text-center text-muted">
                <small>&copy; 2023 КОРЗИНОЧКА. Все права защищены.</small>
            </div>
        </div>
    </footer>

    <!-- Скрипты -->
    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</body>
</html>
